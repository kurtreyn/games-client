<div class="card card-custom" [attr.id]="gameResourceMap.id">
  <!-- Card Image Header -->
  <div class="card-image-wrapper">
    <img
      [src]="gameResourceMap.image_path"
      class="card-img-top custom-card-img"
      alt="{{ gameResourceMap.title }} Preview"
    />
  </div>

  <!-- Card Content Body -->
  <div class="card-body">
    <h5 class="card-title">{{ gameResourceMap.title }}</h5>
    <p class="card-text text-muted">
      {{ gameResourceMap.description }}
    </p>
    <button class="btn btn-primary w-100" (click)="onPlayNow()">Play Now</button>
  </div>
</div>
