<div class="card card-custom" [attr.id]="gameResourceMap.id">
  <div class="card-image-wrapper">
    <img
      [src]="gameResourceMap.image_path"
      class="card-img-top custom-card-img"
      alt="{{ gameResourceMap.title }} Preview"
    />
  </div>

  <div class="card-body">
    <h5 class="card-title">{{ gameResourceMap.title }}</h5>
    <p class="card-text text-muted">
      {{ gameResourceMap.description }}
    </p>
  </div>

  <div class="card-footer text-muted text-center">
    <div class="btn-container">
      <button class="btn btn-primary w-100" (click)="onStartNewGame(gameResourceMap.id)">
        Start New Game
      </button>

      @if (numberOfAvailableGames() > 0) {
        <button class="btn btn-secondary w-100 mt-2" (click)="onJoinGame(gameResourceMap.id)">
          Join Game
        </button>
      }

      @if (availableGamesId().includes(gameResourceMap.id)) {
        <span class="badge bg-success mt-2">
          Games available to join: {{ numberOfAvailableGames() }}
        </span>
      }
    </div>
  </div>
</div>
