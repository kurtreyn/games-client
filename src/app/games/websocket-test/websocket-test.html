<div class="container max-width-md mt-5">
  <div class="card shadow-sm">
    <div
      class="card-header bg-primary text-white d-flex justify-content-between align-items-center"
    >
      <h5 class="mb-0">WebSocket Messenger</h5>
      <span class="badge" [ngClass]="isConnected ? 'bg-success' : 'bg-danger'">
        {{ isConnected ? 'Connected' : 'Disconnected' }}
      </span>
    </div>

    <!-- Message History Window -->
    <div class="card-body bg-light" style="height: 300px; overflow-y: auto">
      <div *ngIf="messages.length === 0" class="text-muted text-center mt-5">
        No messages yet. Send a message to start chatting!
      </div>
      <div *ngFor="let msg of messages" class="mb-2 p-2 rounded shadow-xs bg-white text-dark">
        <small class="text-muted d-block font-monospace">{{
          msg.timestamp | date: 'mediumTime'
        }}</small>
        <strong>{{ msg.type === 'sent' ? 'You' : 'Server' }}:</strong> {{ msg.text }}
      </div>
    </div>

    <!-- Message Input Form -->
    <div class="card-footer">
      <form
        (ngSubmit)="sendMessage(messageInput.value); messageInput.value = ''"
        class="input-group"
      >
        <input
          #messageInput
          type="text"
          class="form-control"
          placeholder="Type your message here..."
          [disabled]="!isConnected"
          required
        />
        <button class="btn btn-primary" type="submit" [disabled]="!isConnected">Send</button>
      </form>
    </div>
  </div>
</div>
